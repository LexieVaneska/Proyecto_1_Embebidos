# Target machine — genericx86-64 is perfect for VirtualBox
MACHINE = "genericx86-64"

# Produce a vmdk disk image VirtualBox can import directly
IMAGE_FSTYPES += "wic.vmdk"

# Use latest stable Rust instead of Kirkstone's old bundled one
RUST_VERSION = "1.94.1"  

# Add X11 feature support
DISTRO_FEATURES:append = " x11"

# OpenCV needs to be built with GTK or Qt for highgui
PACKAGECONFIG:append:pn-opencv = " gtk+"

# Parallel build tuning — set to your core count
BB_NUMBER_THREADS = "8"
PARALLEL_MAKE = "-j 8"

# Enable the Rust toolchain
# (meta-rust handles this, but make it explicit)
PACKAGECONFIG:append:pn-openssl = " perl"
